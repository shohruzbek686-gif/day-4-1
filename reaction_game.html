<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Reaction Game</title>

<style>
body {
    font-family: sans-serif;
    text-align: center;
    background: #222;
    color: white;
    margin-top: 100px;
}

#box {
    width: 300px;
    height: 300px;
    margin: 40px auto;
    background: red;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 20px;
    font-size: 20px;
}

button {
    padding: 10px 30px;
    font-size: 18px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Reaction Game ⚡</h1>

<button onclick="startGame()">Start</button>

<div id="box">Kut...</div>

<h2 id="result"></h2>

<script>
let startTime, endTime;
let waiting = false;

function startGame() {
    document.getElementById("result").textContent = "";
    const box = document.getElementById("box");
    box.style.background = "red";
    box.textContent = "Kut...";

    waiting = true;

    setTimeout(() => {
        box.style.background = "green";
        box.textContent = "BOS!";
        startTime = new Date().getTime();
        waiting = false;
    }, Math.random() * 3000 + 2000);
}

document.getElementById("box").onclick = function() {
    if (waiting) {
        document.getElementById("result").textContent = "❌ Erta bosding!";
        return;
    }

    if (!startTime) return;

    endTime = new Date().getTime();
    let reaction = endTime - startTime;

    document.getElementById("result").textContent =
        "⏱ " + reaction + " ms";
};
</script>

</body>
</html>
