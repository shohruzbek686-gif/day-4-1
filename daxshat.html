<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Qiziqarli Web Sahifa</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background: linear-gradient(135deg, #667eea, #764ba2);
    color:white;
    height:100vh;
}

header{
    text-align:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
}

.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:70vh;
    gap:30px;
}

.card{
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:20px;
    backdrop-filter: blur(10px);
    width:200px;
    text-align:center;
    transition:0.4s;
    cursor:pointer;
}

.card:hover{
    transform: translateY(-20px) scale(1.05);
    background: rgba(255,255,255,0.2);
}

.card img{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#ff7b00;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff5100;
}

footer{
    text-align:center;
    padding:15px;
    font-size:14px;
}

</style>
</head>
<body>

<header> Qiziqarli Web Sahifa </header>

<div class="container">
    
    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
        <h3>Burger</h3>
        <p>Juda mazali burger</p>
        <button>Buyurtma</button>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046751.png">
        <h3>grill</h3>
        <p>Issiq va yangi pitsa</p>
        <button>Buyurtma</button>
    </div>

    <div class="card">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046786.png">
        <h3>Kartoshka</h3>
        <p>Sovuq ichimliklar</p>
        <button>Buyurtma</button>
    </div>

</div>

<footer>
    © 2026 Qiziqarli sayt
</footer>

</body>
</html>
